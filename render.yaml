services:
  - type: web
    name: task-radar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python web_server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: QUXIAN_COOKIE
        sync: false
      - key: QUXIAN_FORMHASH
        sync: false
    plan: free

  - type: cron
    name: task-radar-spider
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python auto_spider.py
    schedule: "*/10 * * * *"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: QUXIAN_COOKIE
        sync: false
      - key: QUXIAN_FORMHASH
        sync: false
    plan: free
